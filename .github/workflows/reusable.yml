name: Reusable Workflow

on:
  workflow_call:
    inputs:
      config_path:
        required: false
        type: string
        default: 'reusable-repo/.github/workflow-config.yaml'
      string_input:
        required: false
        type: string
      another_string:
        required: false
        type: string
      bool_input:
        required: false
        type: string
      another_bool:
        required: false
        type: string

jobs:
  resolve-config:
    runs-on: windows-latest
    outputs:
      string_input: ${{ steps.set-outputs.outputs.string_input }}
      another_string: ${{ steps.set-outputs.outputs.another_string }}
      bool_input: ${{ steps.set-outputs.outputs.bool_input }}
      another_bool: ${{ steps.set-outputs.outputs.another_bool }}
    steps:
      - name: Checkout reusable workflow repo
        uses: actions/checkout@v4
        with:
          repository: ruskinb1/test-passing-secret
          ref: main
          path: reusable-repo

      - name: Download yq for Windows
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/mikefarah/yq/releases/latest/download/yq_windows_amd64.exe" -OutFile "$env:GITHUB_WORKSPACE\yq.exe"

      - name: Resolve and output all inputs
        id: set-outputs
        shell: pwsh
        run: |
          $env:PATH += ";$env:GITHUB_WORKSPACE"
          $repo = "${env:GITHUB_REPOSITORY}".Split('/')[-1]
          if ("${env:GITHUB_EVENT_NAME}" -eq "pull_request") {
            $branch = "${env:GITHUB_HEAD_REF}"
          } else {
            $branch = "${env:GITHUB_REF_NAME}"
          }
          $configPath = "${{ inputs.config_path }}"

          # Map all possible workflow_call inputs
          $inputsMap = @{
            "string_input"   = "${{ inputs.string_input }}"
            "another_string" = "${{ inputs.another_string }}"
            "bool_input"     = "${{ inputs.bool_input }}"
            "another_bool"   = "${{ inputs.another_bool }}"
          }

          function Get-InputValue($inputName) {
            $wfInput = $inputsMap[$inputName]
            if ([string]::IsNullOrEmpty($wfInput) -or $wfInput -eq 'null') {
              $yqExpr = ".repos.`"$repo`".`"$branch`"." + $inputName
              return (& "$env:GITHUB_WORKSPACE\yq.exe" e "$yqExpr" "$configPath")
            } else {
              return $wfInput
            }
          }

          $string_input = Get-InputValue "string_input"
          $another_string = Get-InputValue "another_string"
          $bool_input = Get-InputValue "bool_input"
          $another_bool = Get-InputValue "another_bool"

          # Output as strings (booleans as "true"/"false")
          if ($bool_input.ToString().ToLower() -eq "true") { $bool_input_str = "true" } else { $bool_input_str = "false" }
          if ($another_bool.ToString().ToLower() -eq "true") { $another_bool_str = "true" } else { $another_bool_str = "false" }

          "string_input=$string_input" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "another_string=$another_string" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "bool_input=$bool_input_str" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "another_bool=$another_bool_str" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

  check-booleans:
    needs: resolve-config
    runs-on: windows-latest
    steps:
      - name: Check boolean conversion with fromJSON
        shell: pwsh
        run: |
          $boolInput = ${{ fromJSON(needs.resolve-config.outputs.bool_input) }}
          $anotherBool = ${{ fromJSON(needs.resolve-config.outputs.another_bool) }}
          Write-Host "bool_input (fromJSON): $boolInput (type: $($boolInput.GetType().Name))"
          Write-Host "another_bool (fromJSON): $anotherBool (type: $($anotherBool.GetType().Name))"
          if ($boolInput) {
            Write-Host "bool_input logic works!"
          } else {
            Write-Host "bool_input logic is false."
          }
          if ($anotherBool) {
            Write-Host "another_bool logic works!"
          } else {
            Write-Host "another_bool logic is false."
          }
