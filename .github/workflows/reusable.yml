name: Reusable Workflow

on:
  workflow_call:
    inputs:
      config_path:
        required: false
        type: string
        default: 'reusable-repo/.github/workflow-config.yaml'
      string_input:
        required: false
        type: string
      another_string:
        required: false
        type: string
      bool_input:
        required: false
        type: string
      another_bool:
        required: false
        type: string

jobs:
  resolve-config:
    runs-on: windows-latest
    outputs:
      string_input: ${{ steps.set-outputs.outputs.string_input }}
      another_string: ${{ steps.set-outputs.outputs.another_string }}
      bool_input: ${{ steps.set-outputs.outputs.bool_input }}
      another_bool: ${{ steps.set-outputs.outputs.another_bool }}
    steps:
      - name: Checkout reusable workflow repo
        uses: actions/checkout@v4
        with:
          repository: ruskinb1/test-passing-secret
          ref: main
          path: reusable-repo

      - name: Download yq for Windows
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/mikefarah/yq/releases/latest/download/yq_windows_amd64.exe" -OutFile "$env:GITHUB_WORKSPACE\yq.exe"

      - name: Dynamically resolve and output all inputs
        id: set-outputs
        shell: pwsh
        run: |
          $env:PATH += ";$env:GITHUB_WORKSPACE"
          $repo = "${env:GITHUB_REPOSITORY}".Split('/')[-1]
          if ("${env:GITHUB_EVENT_NAME}" -eq "pull_request") {
            $branch = "${env:GITHUB_HEAD_REF}"
          } else {
            $branch = "${env:GITHUB_REF}".Split('/')[-1]
          }
          $configPath = "${{ inputs.config_path }}"

          $stringInputs = @("string_input", "another_string")
          $boolInputs = @("bool_input", "another_bool")

          function Get-InputValue($inputName) {
            $wfInput = "${{ inputs[$inputName] }}"
            if ([string]::IsNullOrEmpty($wfInput) -or $wfInput -eq 'null') {
              $yqExpr = ".repos.`"$repo`".`"$branch`"." + $inputName
              Write-Host "YQ Expression: $yqExpr"
              Write-Host "Config Path: $configPath"
              return (& "$env:GITHUB_WORKSPACE\yq.exe" e "$yqExpr" "$configPath")
            } else {
              return $wfInput
            }
          }

          foreach ($inputName in $stringInputs) {
            $val = Get-InputValue $inputName
            Write-Host "$inputName=$val"
            "$inputName=$val" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

          foreach ($inputName in $boolInputs) {
            $val = Get-InputValue $inputName
            if ($val.ToString().ToLower() -eq "true") { $boolString = "true" }
            else { $boolString = "false" }
            Write-Host "$inputName=$boolString"
            "$inputName=$boolString" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

  debug-config:
    needs: resolve-config
    runs-on: windows-latest
    steps:
      - name: Debug resolved config
        shell: pwsh
        run: |
          Write-Host "string_input: ${{ needs.resolve-config
.outputs.string_input }}"
          Write-Host "another_string: ${{ needs.resolve-config.outputs.another_string }}"
          Write-Host "bool_input: ${{ needs.resolve-config.outputs.bool_input }}"
          Write-Host "another_bool: ${{ needs.resolve-config.outputs.another_bool }}"

  check-booleans:
    needs: resolve-config
    runs-on: windows-latest
    steps:
      - name: Check boolean conversion with fromJSON
        shell: pwsh
        run: |
          $boolInput = ${{ fromJSON(needs.resolve-config.outputs.bool_input) }}
          $anotherBool = ${{ fromJSON(needs.resolve-config.outputs.another_bool) }}
          Write-Host "bool_input (fromJSON): $boolInput (type: $($boolInput.GetType().Name))"
          Write-Host "another_bool (fromJSON): $anotherBool (type: $($anotherBool.GetType().Name))"
          if ($boolInput) {
            Write-Host "bool_input logic works!"
          } else {
            Write-Host "bool_input logic is false."
          }
          if ($anotherBool) {
            Write-Host "another_bool logic works!"
          } else {
            Write-Host "another_bool logic is false."
          }
