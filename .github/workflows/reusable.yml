name: Reusable Workflow

on:
  workflow_call:
    inputs:
      config_path:
        required: false
        type: string
        default: 'reusable-repo/.github/workflow-config.yaml'
      string_input:
        required: false
        type: string
        description: 'Override string input'
      bool_input:
        required: false
        type: boolean
        description: 'Override boolean input'

jobs:
  resolve-config:
    runs-on: ubuntu-latest
    outputs:
      string_input: ${{ steps.set-outputs.outputs.string_input }}
      bool_input: ${{ steps.set-outputs.outputs.bool_input }}
    steps:
      - name: Checkout reusable workflow repo
        uses: actions/checkout@v4
        with:
          repository: ruskinb1/test-passing-secret
          ref: main
          path: reusable-repo

      - name: Install yq
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip
          pip install yq

      - name: Read config file
        id: read-config
        run: |
          REPO="${GITHUB_REPOSITORY##*/}"
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            BRANCH="${GITHUB_HEAD_REF}"
          else
            BRANCH="${GITHUB_REF##*/}"
          fi
          CONFIG_PATH="${{ inputs.config_path }}"
          echo "REPO=$REPO"
          echo "BRANCH=$BRANCH"
          cat $CONFIG_PATH
          STRING_INPUT=$(yq ".repos[\"$REPO\"][\"$BRANCH\"].string_input" "$CONFIG_PATH")
          BOOL_INPUT=$(yq ".repos[\"$REPO\"][\"$BRANCH\"].bool_input" "$CONFIG_PATH")
          echo "string_input=$STRING_INPUT" >> $GITHUB_OUTPUT
          echo "bool_input=$BOOL_INPUT" >> $GITHUB_OUTPUT
      
      - name: Set outputs (prefer direct input, fallback to config)
        id: set-outputs
        run: |
          STRING_INPUT="${{ inputs.string_input }}"
          BOOL_INPUT="${{ inputs.bool_input }}"
          if [[ -z "$STRING_INPUT" || "$STRING_INPUT" == 'null' ]]; then
            STRING_INPUT="${{ steps.read-config.outputs.string_input }}"
          fi
          if [[ -z "$BOOL_INPUT" || "$BOOL_INPUT" == 'null' ]]; then
            BOOL_INPUT="${{ steps.read-config.outputs.bool_input }}"
          fi
          # Normalize boolean to true/false string
          if [[ "$BOOL_INPUT" == "True" ]]; then BOOL_INPUT="true"; fi
          if [[ "$BOOL_INPUT" == "False" ]]; then BOOL_INPUT="false"; fi
          echo "Final STRING_INPUT=$STRING_INPUT"
          echo "Final BOOL_INPUT=$BOOL_INPUT"
          echo "string_input=$STRING_INPUT" >> $GITHUB_OUTPUT
          echo "bool_input=$BOOL_INPUT" >> $GITHUB_OUTPUT

  debug-config:
    needs: resolve-config
    runs-on: ubuntu-latest
    steps:
      - name: Debug resolved config
        run: |
          echo "String input: ${{ needs.resolve-config.outputs.string_input }}"
          echo "Boolean input: ${{ needs.resolve-config.outputs.bool_input }}"
