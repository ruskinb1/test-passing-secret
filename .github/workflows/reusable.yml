name: Reusable Workflow

on:
  workflow_call:
    inputs:
      config_path:
        required: false
        type: string
        default: 'reusable-repo/.github/workflow-config.yaml'
      string_input:
        required: false
        type: string
        description: 'Override string input'
      bool_input:
        required: false
        type: boolean
        description: 'Override boolean input'

jobs:
  resolve-config:
    runs-on: windows-latest
    outputs:
      string_input: ${{ steps.set-outputs.outputs.string_input }}
      bool_input: ${{ steps.set-outputs.outputs.bool_input }}
    steps:
      - name: Checkout reusable workflow repo
        uses: actions/checkout@v4
        with:
          repository: ruskinb1/test-passing-secret
          ref: main
          path: reusable-repo

      - name: Download yq for Windows
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/mikefarah/yq/releases/latest/download/yq_windows_amd64.exe" -OutFile "$env:GITHUB_WORKSPACE\yq.exe"

      - name: Read config file and set outputs
        id: set-outputs
        shell: pwsh
        run: |
          $env:PATH += ";$env:GITHUB_WORKSPACE"
          $repo = "${env:GITHUB_REPOSITORY}".Split('/')[1]
          if ("${env:GITHUB_EVENT_NAME}" -eq "pull_request") {
            $branch = "${env:GITHUB_HEAD_REF}"
          } else {
            $branch = "${env:GITHUB_REF}".Split('/')[-1]
          }
          $configPath = "${{ inputs.config_path }}"
          Write-Host "REPO=$repo"
          Write-Host "BRANCH=$branch"
          Get-Content $configPath | Write-Host

          # Read values from YAML
          $stringInput = & "$env:GITHUB_WORKSPACE\yq.exe" e ".repos.\"$repo\".\"$branch\".string_input" $configPath
          $boolInput = & "$env:GITHUB_WORKSPACE\yq.exe" e ".repos.\"$repo\".\"$branch\".bool_input" $configPath

          Write-Host "YQ STRING_INPUT=$stringInput"
          Write-Host "YQ BOOL_INPUT=$boolInput"

          # Use direct input if provided, else config value
          $finalStringInput = "${{ inputs.string_input }}"
          if ([string]::IsNullOrEmpty($finalStringInput) -or $finalStringInput -eq 'null') {
            $finalStringInput = $stringInput
          }
          $finalBoolInput = "${{ inputs.bool_input }}"
          if ([string]::IsNullOrEmpty($finalBoolInput) -or $finalBoolInput -eq 'null') {
            $finalBoolInput = $boolInput
          }

          # Normalize boolean to 'true' or 'false'
          if ($finalBoolInput -eq "True") { $finalBoolInput = "true" }
          if ($finalBoolInput -eq "False") { $finalBoolInput = "false" }

          Write-Host "Final STRING_INPUT=$finalStringInput"
          Write-Host "Final BOOL_INPUT=$finalBoolInput"

          "string_input=$finalStringInput" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "bool_input=$finalBoolInput" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

  debug-config:
    needs: resolve-config
    runs-on: windows-latest
    steps:
      - name: Debug resolved config
        shell: pwsh
        run: |
          Write-Host "String input: ${{ needs.resolve-config.outputs.string_input }}"
          Write-Host "Boolean input: ${{ needs.resolve-config.outputs.bool_input }}"
