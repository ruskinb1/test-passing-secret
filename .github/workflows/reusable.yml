name: Reusable Workflow

on:
  workflow_call:
    inputs:
      config_path:
        required: false
        type: string
        default: '.github/workflow-config.yaml'

jobs:
  resolve-config:
    runs-on: ubuntu-latest
    outputs:
      string_input: ${{ steps.set-outputs.outputs.string_input }}
      bool_input: ${{ steps.set-outputs.outputs.bool_input }}
    steps:
      # Checkout the reusable workflow repo, not the caller repo!
      - name: Checkout reusable workflow repo
        uses: actions/checkout@v4
        with:
          repository: ruskinb1/test-passing-secret
          ref: main # or the branch/tag you want
          path: reusable-repo

      - name: Install yq
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip
          pip install yq

      - name: Read config file
        id: read-config
        run: |
          REPO="${GITHUB_REPOSITORY##*/}"
          BRANCH="${GITHUB_REF##*/}"
          CONFIG_PATH="reusable-repo/.github/workflow-config.yaml"
          STRING_INPUT=$(yq ".repos[\"$REPO\"][\"$BRANCH\"].string_input" "$CONFIG_PATH")
          BOOL_INPUT=$(yq ".repos[\"$REPO\"][\"$BRANCH\"].bool_input" "$CONFIG_PATH")
          echo "string_input=$STRING_INPUT" >> $GITHUB_OUTPUT
          echo "bool_input=$BOOL_INPUT" >> $GITHUB_OUTPUT

      - name: Set outputs
        id: set-outputs
        run: |
          echo "string_input=${{ steps.read-config.outputs.string_input }}" >> $GITHUB_OUTPUT
          echo "bool_input=${{ steps.read-config.outputs.bool_input }}" >> $GITHUB_OUTPUT
